<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholarMates | Find Your Future</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .hero {
            background: url('/static/images/index.jpg');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 80px 20px;
            text-align: center;
        }

        .scholarship-grid {
            display: flex;
            flex-direction: column;
            padding: 20px 15%;
            gap: 0;
        }

        .preview-card {
            cursor: pointer;
            background: #fff;
            padding: 30px 10px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            transition: background-color 0.2s;
        }

        .preview-card:hover {
            background-color: #edf2fb;
        }

        .preview-card:last-child {
            border-bottom: none;
        }

        .modal-content h4:first-of-type {
            margin-top: 40px;
            color: #023e8a;
        }

        #modalDesc {
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .modal-content h4:last-of-type {
            margin-top: 20px;
        }

        .modal-content hr {
            margin-top: 10px;
            margin-bottom: 20px;
            border: 0;
            border-top: 1px solid #eee;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            inset: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            overflow-y: auto;
            padding: 24px 16px;
        }

        .modal-content {
            background-color: #fff;
            margin: 20px auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-sizing: border-box;
        }

        .close-modal {
            position: sticky;
            top: 0;
            float: right;
            right: 0;
            font-size: 28px;
            cursor: pointer;
            background: white;
            padding-left: 10px;
            z-index: 2;
        }

        .apply-btn {
            display: inline-block;
            margin-top: 15px;
            background: #00509d;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .scholarship-grid {
                padding: 20px 6%;
            }

            .modal-content {
                width: 95%;
                padding: 22px;
                max-height: 88vh;
            }
        }
    </style>
</head>
<body bgcolor="fefcfb">
    <nav class="topbar">
        <h1>ScholarMates</h1>
        <div>
            <a href="{{ url_for('login') }}">Login</a>
            <a href="{{ url_for('register') }}" style="margin-left:15px;">Register</a>
        </div>
    </nav>

    <header class="hero">
        <h2>Envision 2030</h2>
        <p>Browse available scholarships and start your application today.</p>
    </header>

    <div class="filter-container" style="padding: 20px 10%; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
        <input type="text" id="search-input" onkeyup="filterScholarships()" placeholder="Search by scholarship name..."
               style="padding: 10px; border-radius: 8px; border: 1px solid #1b5e20; width: 300px;">

        <select id="dept-filter" onchange="filterScholarships()" style="padding: 10px; border-radius: 8px; border: 1px solid #1b5e20;">
            <option value="all">All Departments</option>
            <option value="Information Technology">Information Technology</option>
            <option value="Information Systems">Information Systems</option>
            <option value="Finance and Information Management">Finance and Information Management</option>
            <option value="Financial Accounting">Financial Accounting</option>
            <option value="Information and Corporate Management">Information and Corporate Management</option>
            <option value="Management Accounting">Management Accounting</option>
            <option value="Auditing and Taxation">Auditing and Taxation</option>
        </select>

        <button type="button" onclick="resetDropdown()" style="padding: 10px 15px; background: none; border: 1px solid #666; border-radius: 8px; cursor: pointer; color: #666;">
            Clear Filter
        </button>
    </div>

    <main class="scholarship-grid" id="scholarship-container">
        {% for s in scholarships %}
        <div class="preview-card"
             data-dept="{{ s.department }}"
             data-title="{{ s.title }}"
             data-desc="{{ s.description }}"
             data-req="{{ s.requirements }}"
             onclick="openModal(this)">

            <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <div>
                    <span class="dept-tag" style="font-size: 0.8rem; color: #1b5e20; font-weight: bold;">{{ s.department }}</span>
                    <h3 style="margin: 5px 0;">{{ s.title }}</h3>
                </div>
                <span style="font-size: 0.85rem; color: #888;">Deadline: {{ s.deadline }}</span>
            </div>
            <p style="color: #666; margin: 10px 0 0 0;">{{ s.description|striptags|truncate(150) }}</p>
        </div>
        {% endfor %}
    </main>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color: #1b5e20;"></h2>
            <hr>

            <h4>Description</h4>
            <div id="modalDesc"></div>

            <h4>Requirements</h4>
            <div id="modalReq"></div>

            <div style="margin-top: 30px; text-align: right;">
                <a href="{{ url_for('login') }}" class="apply-btn">Apply</a>
            </div>
        </div>
    </div>

    <script>
        function filterScholarships() {
            const filterValue = document.getElementById('dept-filter').value;
            const searchVal = document.getElementById('search-input').value.toLowerCase();
            const cards = document.getElementsByClassName('preview-card');

            for (let card of cards) {
                const title = card.querySelector('h3').innerText.toLowerCase();
                const cardDept = card.getAttribute('data-dept');

                const matchesSearch = title.includes(searchVal);
                const matchesDept = (filterValue === 'all' || cardDept === filterValue);

                if (matchesSearch && matchesDept) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            }
        }

        function resetDropdown() {
            document.getElementById('dept-filter').value = 'all';
            document.getElementById('search-input').value = '';
            filterScholarships();
        }

        function openModal(card) {
            const title = card.getAttribute('data-title');
            const desc = card.getAttribute('data-desc');
            const req = card.getAttribute('data-req');

            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerHTML = desc;
            document.getElementById('modalReq').innerHTML = req;

            document.getElementById('detailsModal').style.display = "block";
            document.body.style.overflow = "hidden";
        }

        function closeModal() {
            document.getElementById('detailsModal').style.display = "none";
            document.body.style.overflow = "auto";
        }

        window.onclick = function(event) {
            let modal = document.getElementById('detailsModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>

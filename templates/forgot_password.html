<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .container { max-width: 480px; margin: 60px auto; background: #fff; padding: 24px; border-radius: 14px; box-shadow: 0 6px 16px rgba(0,0,0,0.08); }
        .btn { background:#5f61d6; color:#fff; border:none; padding:10px 14px; border-radius:8px; cursor:pointer; font-weight:600; width:100%; }
        .msg { background:#e8f5e9; color:#5f61d6; padding:10px; border-radius:8px; margin-bottom:12px; }
        .err { background:#ffebee; color:#c62828; padding:10px; border-radius:8px; margin-bottom:12px; }
    </style>
</head>
<body class="login-page">
    <div class="container" style="position:relative; z-index:2;">
        <h2>Reset your password</h2>
        <p>Enter your account email and we'll send a reset link.</p>

        {% if message %}<div class="msg">{{ message }}</div>{% endif %}
        {% if error %}<div class="err">{{ error }}</div>{% endif %}

        <form method="POST">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;margin:8px 0 16px;">
            <button type="submit" class="btn">Send reset link</button>
        </form>
        <p style="margin-top:12px;"><a href="{{ url_for('login') }}">Back to login</a></p>
    </div>
</body>
</html>

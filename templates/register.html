<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Scholarship Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">

    <div class="overlay"></div>

    <div class="login-container">
        <div class="login-left">
            <div class="branding">
                <h1>Scholarship Tracker</h1>
                <p>
                    Register to apply for scholarships, upload required documents,
                    and receive important updates about your application.
                </p>
            </div>
        </div>

        <div class="login-right">
            <div class="login-card">
                <h2>Create Account</h2>
                <p class="subtitle">Student registration</p>

                <form method="POST" action="{{ url_for('register') }}">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="full_name" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="Create your password" required>
                    </div>

                    <button type="submit" class="login-btn">Register</button>
                </form>

                <p class="bottom-text">
                    Already have an account?
                    <a href="{{ url_for('login') }}">Login here</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>

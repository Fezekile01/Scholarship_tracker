<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Scholarship Deadline</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
    
    /* Google Font for a modern look */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

    body {
        font-family: 'Inter', sans-serif;
        background-color: #f4f5f7;
        color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    .container {
        width: 100%;
        max-width: 500px;
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        border: none;
    }

    h2 {
        color: #5f61d6;
        font-weight: 600;
        margin-top: 0;
        text-align: center;
    }

    hr {
        border: 0;
        border-top: 1px solid #eee;
        margin: 20px 0 30px 0;
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
        font-size: 0.9rem;
        color: #555;
    }

    input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e1e1e1;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 1rem;
        transition: border-color 0.3s ease;
    }

    input:focus {
        outline: none;
        border-color: #5f61d6;
    }

    /* Read-only styling */
    .readonly-field {
        background-color: #f8f9fa;
        color: #888;
        border-color: #eee;
        cursor: not-allowed;
    }

    small {
        display: block;
        margin-top: 6px;
        color: #999;
        font-size: 0.8rem;
    }

    /* Button Styling */
    .btn-container {
        margin-top: 30px;
        display: flex;
        gap: 10px;
    }

    .btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        text-align: center;
        font-weight: 600;
        font-size: 0.95rem;
        transition: all 0.3s ease;
    }

    .btn-success {
        background-color: #5f61d6;
        color: white;
    }

    .btn-success:hover {
        background-color: #4a4cb3;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(95, 97, 214, 0.3);
    }

    .btn-secondary {
        background-color: white;
        color: #666;
        border: 2px solid #e1e1e1;
    }

    .btn-secondary:hover {
        background-color: #f9f9f9;
        color: #333;
        border-color: #ccc;
    }

    </style>
</head>
<body>
    <div class="container">
        <h2>Edit Scholarship Details</h2>
        <hr>
        
        <form method="POST">
            <div class="form-group">
                <label>Scholarship Title:</label>
                <input type="text" name="title" value="{{ scholarship.title }}" class="readonly-field" readonly>
                <small>The title cannot be changed once applications have started.</small>
            </div>

            <div class="form-group">
                <label for="deadline">Update Deadline:</label>
                <input type="date" id="deadline" name="deadline" value="{{ scholarship.deadline }}" required>
            </div>

            <div style="margin-top: 20px;">
                <button type="submit" class="btn btn-success">Save Changes & Notify Students</button>
                <a href="{{ url_for('admin_scholarships') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>

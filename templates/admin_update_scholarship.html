<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Scholarship</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        .form-page-wrapper {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .form-header-card {
            background: linear-gradient(90deg, #2e7d32, #fbc02d);
            color: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .form-header-card h2 {
            font-size: 30px;
            margin-bottom: 10px;
        }

        .form-header-card p {
            font-size: 16px;
            line-height: 1.6;
        }

        .scholarship-form-card {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            color: #1b5e20;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px;
            border: 1px solid #d6d6d6;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            background: #fcfcfc;
            transition: 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #fbc02d;
            box-shadow: 0 0 8px rgba(251, 192, 45, 0.3);
            background: white;
        }

        .form-group textarea {
            resize: vertical;
        }

        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .right-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .cancel-btn {
            display: inline-block;
            padding: 14px 22px;
            border-radius: 10px;
            background: #eeeeee;
            color: #333;
            text-decoration: none;
            font-weight: bold;
        }

        .cancel-btn:hover {
            background: #dddddd;
        }

        .save-btn {
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #2e7d32, #fbc02d);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .save-btn:hover {
            opacity: 0.93;
        }

        .delete-btn {
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            background: #c62828;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .delete-btn:hover {
            background: #8e0000;
        }

        .delete-form {
            margin: 0;
        }

        .update-form {
            margin: 0;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .form-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .right-actions {
                width: 100%;
                flex-direction: column;
            }

            .cancel-btn,
            .save-btn,
            .delete-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body class="dashboard-page">

    <div class="topbar">
        <h1>Edit Scholarship</h1>
        <a href="{{ url_for('admin_scholarships') }}">Back to Manage Scholarships</a>
    </div>

    <div class="form-page-wrapper">

        <div class="form-header-card">
            <h2>Update Scholarship</h2>
            <p>
                Edit the scholarship details below. You can update the deadline,
                change the status, or delete the scholarship.
            </p>
        </div>

        <div class="scholarship-form-card">

            <!-- UPDATE FORM -->
            <form method="POST"
                  action="{{ url_for('edit_scholarship', id=scholarship.id) }}"
                  class="update-form">

                <div class="form-row">
                    <div class="form-group">
                        <label for="title">Scholarship Title</label>
                        <input type="text" id="title" name="title" value="{{ scholarship.title }}" required>
                    </div>

                    <div class="form-group">
                        <label for="deadline">Application Deadline</label>
                        <input type="date" id="deadline" name="deadline" value="{{ scholarship.deadline }}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">Scholarship Description</label>
                    <textarea id="description" name="description" rows="4" required>{{ scholarship.description }}</textarea>
                </div>

                <div class="form-group">
                    <label for="requirements">Requirements</label>
                    <textarea id="requirements" name="requirements" rows="4" required>{{ scholarship.requirements }}</textarea>
                </div>

                <div class="form-group">
                    <label for="status">Scholarship Status</label>
                    <select id="status" name="status" required>
                        <option value="Open" {% if scholarship.status == 'Open' %}selected{% endif %}>Open</option>
                        <option value="Closed" {% if scholarship.status == 'Closed' %}selected{% endif %}>Closed</option>
                    </select>
                </div>

                <div class="form-actions">
                    <div></div>

                    <div class="right-actions">
                        <a href="{{ url_for('admin_scholarships') }}" class="cancel-btn">Cancel</a>
                        <button type="submit" class="save-btn">Update Scholarship</button>
                    </div>
                </div>
            </form>

            <!-- DELETE FORM - completely separate -->
            <form method="POST"
                  action="{{ url_for('delete_scholarship', id=scholarship.id) }}"
                  class="delete-form"
                  onsubmit="return confirm('Are you sure you want to delete this scholarship?');"
                  style="margin-top: 15px;">
                <button type="submit" class="delete-btn">Delete Scholarship</button>
            </form>

        </div>

    </div>

</body>
</html>
